<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUCT MANGMENT SYSTEM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pms">
        <div id="head">
            <h2>PRODUCT MANGMENT SYSTEM</h2>
        </div>
        <div id="inputs">
            <input type="text" id="title" placeholder="title">
                <div class="price">
                    <input type="number" onkeyup="totalCalc()" id="price" placeholder="price">
                    <input type="number" onkeyup="totalCalc()" id="taxes" placeholder="taxes">
                    <input type="number" onkeyup="totalCalc()" id="ads" placeholder="ads">
                    <input type="number" onkeyup="totalCalc()" id="discount" placeholder="discount">
                    <small id="total"></small>
                </div>
        <input type="number" id="count" placeholder="count">    
        <input type="text" id="category" placeholder="category">
        <button id="create">Create</button>    
        </div>
        <div id="outputs">
            <div class="searchSection">
                <input onkeyup="searchData(this.value)" type="text" id="search" placeholder="search">    
                <div class="searchBtn">
                    <button onclick="getSearchMode(this.id)" id="searchByTitle">Search By Title</button>
                    <button onclick="getSearchMode(this.id)" id="searchByCategory">Search By Category</button>
                </div>
                <div id="deleteAll"></div>
                    <table>
                        <tr>
                            <th>id</th>
                            <th>title</th>
                            <th>price</th>
                            <th>taxes</th>
                            <th>ads</th>
                            <th>discount</th>
                            <th>total</th>
                            <th>category</th>
                            <th>update</th>
                            <th>delete</th>
                        </tr>
                        <tbody id="showTable">

                        </tbody>
                    </table>
                </div>
        </div>
    </div>
<script src="Cruds.js"></script>
</body>
</html>
